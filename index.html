<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>MC Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        user-select: none;
      }
      canvas.game {
        display: block;
      }

      #water-tint {
        position: fixed;
        inset: 0;
        background: rgba(24, 60, 150, 0.28);
        pointer-events: none;
        display: none;
        z-index: 3;
      }
      #water-tint.visible {
        display: block;
      }

      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 20px;
        height: 20px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 5;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.85);
        mix-blend-mode: difference;
      }
      #crosshair::before {
        left: 9px;
        top: 0;
        width: 2px;
        height: 20px;
      }
      #crosshair::after {
        left: 0;
        top: 9px;
        width: 20px;
        height: 2px;
      }

      #hotbar {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        padding: 4px;
        background: rgba(0, 0, 0, 0.35);
        border-radius: 6px;
        z-index: 5;
      }
      .slot {
        position: relative;
        width: 52px;
        height: 52px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .slot.selected {
        border-color: #fff;
        background: rgba(255, 255, 255, 0.18);
      }
      .slot-key {
        position: absolute;
        left: 3px;
        top: 1px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.75);
        text-shadow: 0 1px 1px #000;
      }
      .slot-icon {
        width: 40px;
        height: 40px;
        image-rendering: pixelated;
      }
      .slot-count {
        position: absolute;
        right: 3px;
        bottom: 1px;
        font-size: 11px;
        font-weight: bold;
        color: #fff;
        text-shadow: 0 1px 1px #000;
        pointer-events: none;
      }

      #inventory {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(8, 12, 22, 0.55);
        z-index: 8;
      }
      #inventory.open {
        display: flex;
      }
      .inv-panel {
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 10px;
        padding: 16px 18px;
        max-width: min(640px, 92vw);
      }
      .inv-title {
        color: #d8e2f0;
        font-size: 14px;
        margin-bottom: 12px;
        text-align: center;
      }
      #inv-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
      }
      .inv-slot {
        cursor: pointer;
      }
      .inv-slot:hover {
        border-color: #ffe27a;
        background: rgba(255, 255, 255, 0.18);
      }
      .inv-name {
        position: absolute;
        left: 50%;
        bottom: -2px;
        transform: translateX(-50%);
        font-size: 9px;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 1px 1px #000;
        white-space: nowrap;
        pointer-events: none;
      }

      #item-name {
        position: fixed;
        left: 50%;
        bottom: 84px;
        transform: translateX(-50%);
        color: #fff;
        font-size: 16px;
        text-shadow: 0 1px 2px #000;
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
        z-index: 5;
      }
      #item-name.visible {
        opacity: 1;
      }

      #hand {
        position: fixed;
        right: 4vw;
        bottom: -3vh;
        width: clamp(120px, 16vw, 220px);
        image-rendering: pixelated;
        pointer-events: none;
        z-index: 4;
        transform-origin: 90% 100%;
        filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.35));
      }
      #hand.punch {
        animation: punch 0.14s ease-out;
      }
      @keyframes punch {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        45% {
          transform: translate(-26px, 30px) rotate(-16deg);
        }
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
      }

      #debug {
        position: fixed;
        left: 8px;
        top: 8px;
        color: #fff;
        font-family: Menlo, Consolas, monospace;
        font-size: 12px;
        text-shadow: 0 1px 1px #000;
        white-space: pre;
        z-index: 5;
        pointer-events: none;
      }

      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(10, 16, 28, 0.72);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        cursor: pointer;
      }
      #overlay.hidden {
        display: none;
      }
      .panel {
        text-align: center;
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 32px 48px;
        max-width: 90vw;
      }
      .panel h1 {
        font-size: 36px;
        margin-bottom: 6px;
        letter-spacing: 2px;
      }
      .panel .sub {
        color: #9fd07f;
        margin-bottom: 18px;
        font-size: 14px;
      }
      .panel ul {
        list-style: none;
        text-align: left;
        display: inline-block;
        margin-bottom: 20px;
        line-height: 1.9;
        font-size: 14px;
        color: #d8e2f0;
      }
      .panel kbd {
        display: inline-block;
        min-width: 22px;
        text-align: center;
        padding: 1px 6px;
        margin-right: 8px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-bottom-width: 2px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        font-family: inherit;
        font-size: 12px;
      }
      .panel .start {
        font-size: 18px;
        color: #ffe27a;
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.45;
        }
      }
      #overlay-hint {
        margin-top: 10px;
        min-height: 16px;
        font-size: 12px;
        color: #ffb066;
      }
      #reset-save {
        margin-top: 8px;
        font-size: 12px;
        color: #8fa4c0;
        text-decoration: underline;
        cursor: pointer;
      }
      #reset-save:hover {
        color: #cfe0f5;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div class="panel">
        <h1 id="overlay-title">MC Demo</h1>
        <div class="sub">Three.js 体素沙盒演示</div>
        <ul>
          <li><kbd>W A S D</kbd>移动</li>
          <li><kbd>鼠标</kbd>视角</li>
          <li><kbd>左键</kbd>破坏方块</li>
          <li><kbd>右键</kbd>放置方块</li>
          <li><kbd>中键</kbd>选取方块</li>
          <li><kbd>滚轮 / 1-9 / 0</kbd>切换物品栏</li>
          <li><kbd>E</kbd>背包(更多方块)</li>
          <li><kbd>右键 TNT</kbd>点燃(小心连锁)</li>
          <li><kbd>空格</kbd>跳跃 / 游泳</li>
          <li><kbd>Shift</kbd>疾跑</li>
          <li><kbd>M</kbd>静音切换</li>
          <li><kbd>T</kbd>时间快进(看日落)</li>
          <li><kbd>Esc</kbd>暂停</li>
        </ul>
        <div class="start">点击开始游戏</div>
        <div id="overlay-hint"></div>
        <div id="reset-save">清除存档,重开新世界</div>
      </div>
    </div>
    <div id="water-tint"></div>
    <div id="inventory">
      <div class="inv-panel">
        <div class="inv-title">背包 — 点击方块放入当前手持槽位(E 或 Esc 关闭)</div>
        <div id="inv-grid"></div>
      </div>
    </div>
    <div id="crosshair"></div>
    <div id="item-name"></div>
    <img id="hand" alt="" />
    <div id="hotbar"></div>
    <div id="debug"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
